version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Automated Research Assistant
# Stack: FastAPI + Groq (LLM) + Qdrant Cloud (vector store)
#
# External services (cloud, no local containers needed):
#   - Groq API:    https://console.groq.com
#   - Qdrant Cloud: https://cloud.qdrant.io
#
# Usage:
#   cp .env.example .env   # fill in GROQ_API_KEY, QDRANT_URL, QDRANT_API_KEY
#   docker-compose up
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-assistant-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
